services:
  db:
    image: postgres:16-alpine
    container_name: dailyplan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dailyplan
      POSTGRES_PASSWORD: dailyplan
      POSTGRES_DB: dailyplan
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dailyplan -d dailyplan"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: dailyplan-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
